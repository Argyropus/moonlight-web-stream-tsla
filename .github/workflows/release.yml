name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: moonlight-linux.tar.gz
          - os: windows-latest
            archive_name: moonlight-windows.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./moonlight-web/web-server
      run: npm install

    - name: Run Frontend Build ONLY
      shell: pwsh
      run: |
        $content = Get-Content buildAll.ps1 -Raw
        $frontendOnly = $content -replace '(?s)foreach\(\$target in \$targets\).*', ''
        Set-Content buildAll-Frontend.ps1 $frontendOnly
        ./buildAll-Frontend.ps1

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: 🛠️ Fix Project Dependency Issues (마법의 패치)
      shell: bash
      run: |
        # 1. 문제의 printf-compat 최신 버전으로 강제 업데이트
        cargo update -p printf-compat
        
        # 2. 불안정한 Rust 문법([0u8; _])을 구버전에서도 호환되는 고정 길이로 강제 교체
        if [ -f "moonlight-common/src/network/launch.rs" ]; then
          sed -i 's/\[0u8; _\]/\[0u8; 32\]/g' moonlight-common/src/network/launch.rs
        fi
        if [ -f "moonlight-common/src/network/mod.rs" ]; then
          sed -i 's/\[0u8; _\]/\[0u8; 32\]/g' moonlight-common/src/network/mod.rs
        fi

        # 3. Nightly 강제 설정을 해제하여 안정된 버전(Stable)으로 빌드하도록 유도
        rm -f rust-toolchain.toml rust-toolchain

    - name: Build Backend (순정 Cargo 빌드)
      run: cargo build --release

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path ./release-files
        Copy-Item finalOutput/static ./release-files/ -Recurse
        Copy-Item target/release/streamer.exe ./release-files/ -ErrorAction SilentlyContinue
        Copy-Item target/release/web-server.exe ./release-files/ -ErrorAction SilentlyContinue
        Copy-Item acme-certificate.ps1 ./release-files/ -ErrorAction SilentlyContinue
        Copy-Item setup.ps1 ./release-files/ -ErrorAction SilentlyContinue
        Compress-Archive -Path ./release-files/* -DestinationPath ./${{ matrix.archive_name }}

    - name: Package Artifacts (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        mkdir ./release-files
        cp -r finalOutput/static ./release-files/
        cp target/release/streamer ./release-files/ 2>/dev/null || true
        cp target/release/web-server ./release-files/ 2>/dev/null || true
        tar -czvf ./${{ matrix.archive_name }} -C ./release-files .

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.archive_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
