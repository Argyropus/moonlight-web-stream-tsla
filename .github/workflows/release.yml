name: Build and Release (No Docker)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: moonlight-linux.tar.gz
          - os: windows-latest
            archive_name: moonlight-windows.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive # 서브모듈 누락 에러 방지!

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./moonlight-web/web-server
      run: npm install

    - name: Run Frontend Build ONLY (도커 부분 제거)
      shell: pwsh
      run: |
        # buildAll.ps1 스크립트에서 cross(도커)를 사용하는 반복문부터 끝까지를 삭제하고 실행합니다.
        $content = Get-Content buildAll.ps1 -Raw
        $frontendOnly = $content -replace '(?s)foreach\(\$target in \$targets\).*', ''
        Set-Content buildAll-Frontend.ps1 $frontendOnly
        ./buildAll-Frontend.ps1

    - name: Set Compatible Rust Version and Fix Syntax
      shell: bash
      run: |
        echo '[toolchain]' > rust-toolchain.toml
        echo 'channel = "nightly-2025-05-01"' >> rust-toolchain.toml
        echo "#![feature(generic_arg_infer)]" | cat - moonlight-common/src/lib.rs > temp && mv temp moonlight-common/src/lib.rs

    - name: Build Backend (순정 Cargo 빌드 - 도커 안 씀!)
      run: cargo build --release

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path ./release-files
        Copy-Item finalOutput/static ./release-files/ -Recurse
        Copy-Item target/release/streamer.exe ./release-files/
        Copy-Item target/release/web-server.exe ./release-files/
        Copy-Item acme-certificate.ps1 ./release-files/ -ErrorAction SilentlyContinue
        Copy-Item setup.ps1 ./release-files/ -ErrorAction SilentlyContinue
        Compress-Archive -Path ./release-files/* -DestinationPath ./${{ matrix.archive_name }}

    - name: Package Artifacts (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        mkdir ./release-files
        cp -r finalOutput/static ./release-files/
        cp target/release/streamer ./release-files/
        cp target/release/web-server ./release-files/
        tar -czvf ./${{ matrix.archive_name }} -C ./release-files .

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.archive_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
